<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitVelo | Next-Gen Network Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #00f2ff;
      --secondary: #0061ff;
      --accent: #ff007a;
      --bg: #050505;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: white;
      overflow-x: hidden;
      perspective: 1000px;
    }

    /* Animated Mesh Background */
    .mesh-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
    }

    .blob {
      position: absolute;
      width: 500px; height: 500px;
      background: linear-gradient(var(--primary), var(--secondary));
      filter: blur(80px);
      border-radius: 50%;
      opacity: 0.2;
      animation: float 20s infinite alternate;
    }

    @keyframes float {
      from { transform: translate(-10%, -10%) rotate(0deg); }
      to { transform: translate(20%, 20%) rotate(360deg); }
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-family: 'Syncopate', sans-serif;
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 0.9;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #fff 30%, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      letter-spacing: -5px;
      animation: titleReveal 1.5s cubic-bezier(0.77, 0, 0.175, 1);
    }

    .hero p {
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 40px;
    }

    /* 3D Floating Phone Mockup */
    .phone-showcase {
      position: relative;
      width: 280px;
      height: 580px;
      background: #111;
      border: 8px solid #222;
      border-radius: 40px;
      box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 30px var(--secondary);
      transform: rotateY(-20deg) rotateX(10deg);
      transition: 0.5s;
      overflow: hidden;
      margin-bottom: -100px;
      z-index: 10;
    }

    .phone-showcase:hover {
      transform: rotateY(0deg) rotateX(0deg) scale(1.05);
    }

    .phone-showcase img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Creative Stats Grid */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 100px 10% 50px;
      width: 100%;
    }

    .stat-card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      padding: 40px;
      border-radius: 30px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .stat-card:hover {
      background: rgba(255, 255, 255, 0.07);
      transform: translateY(-15px);
      border-color: var(--primary);
    }

    .stat-card h2 {
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 10px;
    }

    /* Magnetic Download Button */
    .btn-wrap {
      padding: 50px;
      perspective: 1000px;
    }

    .dl-button {
      position: relative;
      padding: 25px 60px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: 800;
      border-radius: 100px;
      font-size: 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 15px;
      transition: 0.3s;
      overflow: hidden;
    }

    .dl-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 50px var(--primary);
    }

    .dl-button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
      transition: 0.5s;
    }

    .dl-button:hover::before {
      left: 100%;
    }

    /* Scrolling Screenshot Track */
    .track-container {
      padding: 100px 0;
      background: rgba(255,255,255,0.02);
      overflow: hidden;
      white-space: nowrap;
    }

    .track {
      display: inline-block;
      animation: scrollTrack 30s linear infinite;
    }

    .track img {
      width: 250px;
      border-radius: 20px;
      margin: 0 30px;
      filter: grayscale(0.5);
      transition: 0.5s;
    }

    .track img:hover {
      filter: grayscale(0);
      transform: scale(1.1) rotate(5deg);
    }

    @keyframes scrollTrack {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* Footer */
    footer {
      padding: 100px 5%;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 30px;
    }

    .social-links { display: flex; gap: 20px; }
    
    .social-btn {
      width: 60px; height: 60px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .social-btn:hover {
      background: var(--primary);
      transform: rotate(15deg);
    }

    .social-btn img { filter: invert(1); width: 25px; }

    /* Reveal Animation */
    .reveal {
      opacity: 0;
      transform: translateY(50px);
      transition: 1s all ease;
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes titleReveal {
      from { clip-path: inset(0 0 100% 0); transform: translateY(100px); }
      to { clip-path: inset(0 0 0 0); transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="mesh-bg">
    <div class="blob"></div>
  </div>

  <section class="hero">
    <p class="reveal">Experience Real-Time Precision</p>
    <h1>BITVELO</h1>
    
    <div class="phone-showcase">
      <!-- Replace with your actual app home screenshot -->
      <img src="screenshots/0.png" alt="App Preview">
    </div>

    <div class="btn-wrap reveal">
      <a href="https://play.google.com/store/apps/details?id=com.AFG.internetspeedmeter" class="dl-button">
        <img src="https://img.icons8.com/material-sharp/24/000000/google-play.png" alt="Play Icon">
        GET THE APP
      </a>
    </div>
  </section>

  <section class="stats-container">
    <div class="stat-card reveal">
      <h2>700K+</h2>
      <p>Global Installations</p>
    </div>
    <div class="stat-card reveal" style="transition-delay: 0.2s;">
      <h2>4.6</h2>
      <p>Star Rating</p>
    </div>
    <div class="stat-card reveal" style="transition-delay: 0.4s;">
      <h2>16K+</h2>
      <p>Active Every Day</p>
    </div>
  </section>

  <div class="track-container">
    <div class="track">
      <img src="screenshots/1.png" alt="Screen">
      <img src="screenshots/2.png" alt="Screen">
      <img src="screenshots/3.png" alt="Screen">
      <img src="screenshots/0.png" alt="Screen">
      <!-- Duplicate for infinite loop -->
      <img src="screenshots/1.png" alt="Screen">
      <img src="screenshots/2.png" alt="Screen">
      <img src="screenshots/3.png" alt="Screen">
      <img src="screenshots/0.png" alt="Screen">
    </div>
  </div>

  <section class="hero" style="height: 60vh;">
    <h2 class="reveal" style="font-family: 'Syncopate'; font-size: 3rem;">Minimal Design.<br>Powerful Data.</h2>
  </section>

  <footer>
    <div>
      <h3 style="font-family: 'Syncopate';">BitVelo</h3>
      <p style="opacity: 0.5;">Crafted with passion by Mohammad</p>
    </div>
    
    <div class="social-links">
      <a href="mailto:mazizi7171@gmail.com" class="social-btn"><img src="https://img.icons8.com/ios-filled/50/000000/mail.png" alt="Email"></a>
      <a href="https://t.me/Azizi_1231" class="social-btn"><img src="https://img.icons8.com/ios-filled/50/000000/telegram-app.png" alt="Telegram"></a>
      <a href="https://instagram.com/mohammad876886" class="social-btn"><img src="https://img.icons8.com/ios-filled/50/000000/instagram-new.png" alt="Instagram"></a>
    </div>
  </footer>

  <script>
    // Reveal animation on scroll
    function reveal() {
      var reveals = document.querySelectorAll(".reveal");
      for (var i = 0; i < reveals.length; i++) {
        var windowHeight = window.innerHeight;
        var elementTop = reveals[i].getBoundingClientRect().top;
        var elementVisible = 150;
        if (elementTop < windowHeight - elementVisible) {
          reveals[i].classList.add("active");
        }
      }
    }

    window.addEventListener("scroll", reveal);
    reveal(); // Run once on load

    // Mouse Parallax effect for the phone
    document.addEventListener('mousemove', (e) => {
      const phone = document.querySelector('.phone-showcase');
      const x = (window.innerWidth / 2 - e.pageX) / 25;
      const y = (window.innerHeight / 2 - e.pageY) / 25;
      phone.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });
  </script>
</body>
</html>
