<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BitVelo - Ultimate Internet Speed & Data Monitor</title>
  <meta name="description" content="Monitor real-time network speed, per-app data usage, and track network history. Block apps, set limits, and take full control of your internet.">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0e27;
      color: #fff;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Matrix Background */
    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      opacity: 0.1;
    }

    .matrix-column {
      position: absolute;
      top: -100%;
      font-size: 20px;
      color: #00ff88;
      animation: matrixFall linear infinite;
      font-family: 'Courier New', monospace;
    }

    @keyframes matrixFall {
      to {
        top: 100%;
      }
    }

    /* Glowing Orbs Background */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      animation: orbFloat 25s infinite ease-in-out;
      z-index: -1;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: linear-gradient(45deg, #00f5ff, #0080ff);
      top: -300px;
      left: -300px;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: linear-gradient(45deg, #ff00ff, #ff0080);
      bottom: -250px;
      right: -250px;
      animation-delay: 8s;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: linear-gradient(45deg, #00ff88, #00ffff);
      top: 40%;
      left: 60%;
      animation-delay: 16s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(100px, -100px) scale(1.2); }
      50% { transform: translate(-50px, 150px) scale(0.8); }
      75% { transform: translate(150px, 50px) scale(1.1); }
    }

    /* Hero Section */
    header {
      position: relative;
      text-align: center;
      padding: 100px 20px 60px;
      perspective: 1000px;
      overflow: hidden;
    }

    .hero-badge {
      display: inline-block;
      background: linear-gradient(90deg, rgba(0, 245, 255, 0.2), rgba(255, 0, 255, 0.2));
      border: 1px solid rgba(0, 245, 255, 0.3);
      padding: 10px 25px;
      border-radius: 50px;
      font-size: 0.9em;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
      animation: fadeInDown 1s ease;
      letter-spacing: 2px;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-3d {
      font-size: 5.5em;
      font-weight: 900;
      background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88, #00f5ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease infinite, float3D 3s ease-in-out infinite;
      text-shadow: 0 0 80px rgba(0, 245, 255, 0.5);
      letter-spacing: 8px;
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes float3D {
      0%, 100% { transform: translateY(0px) rotateX(0deg); }
      50% { transform: translateY(-20px) rotateX(5deg); }
    }

    .hero-subtitle {
      font-size: 1.8em;
      font-weight: 300;
      margin: 20px auto;
      max-width: 800px;
      line-height: 1.5;
      animation: fadeInUp 1s 0.3s
